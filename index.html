
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEIC in Daily Life - Gender Voices</title>
    <style>
        :root { --primary-color: #4a90e2; --bg-color: #f0f2f5; --a-bubble: #ff6b6b; --b-bubble: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); display: flex; flex-direction: column; align-items: center; padding: 40px 20px; margin: 0; }
        .menu { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center; }
        .menu button { padding: 12px 24px; border: none; border-radius: 25px; background: white; color: var(--primary-color); font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .menu button:hover { background: var(--primary-color); color: white; }
        .chat-container { width: 100%; max-width: 500px; background: #e5ddd5; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); min-height: 400px; display: flex; flex-direction: column; overflow-y: auto; }
        .bubble { margin: 10px 0; padding: 12px 16px; border-radius: 15px; font-size: 16px; line-height: 1.4; max-width: 85%; animation: fadeIn 0.5s ease forwards; }
        .A { background-color: var(--a-bubble); color: white; align-self: flex-start; border-bottom-left-radius: 2px; }
        .B { background-color: var(--b-bubble); color: #333; align-self: flex-end; border-bottom-right-radius: 2px; text-align: right; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .status { margin-top: 15px; font-size: 14px; color: #888; }
    </style>
</head>
<body>

    <h1>Daily TOEIC Conversation</h1>
    <p>A(여성)와 B(남성)의 대화를 들어보세요.</p>

    <div class="menu">
        <button onclick="playScene('Accommodate')">1. Accommodate</button>
        <button onclick="playScene('Acquisition')">2. Acquisition</button>
        <button onclick="playScene('Adjourn')">3. Adjourn</button>
    </div>

    <div class="chat-container" id="chatBox"></div>
    <div class="status" id="statusLabel">준비 완료</div>

    <script>
        const scenes = {
            'Accommodate': [
                { speaker: 'A', text: "I'm trying to book a table for our group, but can they accommodate 10 people?" },
                { speaker: 'B', text: "I called them earlier, and they said they can easily accommodate large groups." },
                { speaker: 'A', text: "That’s great! I was worried because the restaurant looks a bit small." },
                { speaker: 'B', text: "Don't worry, they have a spacious private room in the back." }
            ],
            'Acquisition': [
                { speaker: 'A', text: "Is that a new camera? It looks like a very expensive acquisition." },
                { speaker: 'B', text: "Yes, it’s my latest acquisition for my photography hobby." },
                { speaker: 'A', text: "The image quality is amazing; you definitely made a good choice." },
                { speaker: 'B', text: "Thanks! I spent weeks reading reviews before buying it." }
            ],
            'Adjourn': [
                { speaker: 'A', text: "We’ve been studying for three hours; shall we adjourn the meeting for now?" },
                { speaker: 'B', text: "I agree. Let’s adjourn and go grab some lunch together." },
                { speaker: 'A', text: "Perfect! I know a great sandwich shop just around the corner." },
                { speaker: 'B', text: "Sounds like a plan. I’m starving!" }
            ]
        };

        let voices = [];
        let femaleVoice, maleVoice;

        // 시스템에 내장된 목소리 리스트 로딩
        function loadVoices() {
            voices = window.speechSynthesis.getVoices();
            // 여성 목소리 찾기 (Google US English Female, Samantha, Zira 등)
            femaleVoice = voices.find(v => v.name.includes('Female') || v.name.includes('Zira') || v.name.includes('Samantha') || v.name.includes('Google US English'));
            // 남성 목소리 찾기 (Google US English Male, David, Alex 등)
            maleVoice = voices.find(v => v.name.includes('Male') || v.name.includes('David') || v.name.includes('Alex'));
        }

        window.speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();

        let isPlaying = false;

        function speak(text, speaker, callback) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';

            if (speaker === 'A') {
                msg.voice = femaleVoice; // 여성 보이스 할당
                msg.pitch = 1.1;
                msg.rate = 1.0;
            } else {
                msg.voice = maleVoice;   // 남성 보이스 할당
                msg.pitch = 0.9;
                msg.rate = 1.0;
            }

            msg.onend = callback;
            window.speechSynthesis.speak(msg);
        }

        async function playScene(word) {
            if (isPlaying) return;
            isPlaying = true;

            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML = '';
            document.getElementById('statusLabel').innerText = "재생 중...";

            for (const line of scenes[word]) {
                const div = document.createElement('div');
                div.className = `bubble ${line.speaker}`;
                div.innerText = `${line.speaker}: ${line.text}`;
                chatBox.appendChild(div);
                chatBox.scrollTop = chatBox.scrollHeight;

                await new Promise(resolve => speak(line.text, line.speaker, resolve));
                await new Promise(resolve => setTimeout(resolve, 600));
            }

            isPlaying = false;
            document.getElementById('statusLabel').innerText = "재생 완료";
        }
    </script>
</body>
</html>
