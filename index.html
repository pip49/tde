
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스페인어 시작 - 챕터별 학습</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --text-color: #333;
            --accent-color: #e63946;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1 { color: var(--accent-color); font-size: 1.5rem; margin-bottom: 10px; }

        /* 챕터 선택기 스타일 */
        .chapter-select {
            margin-bottom: 20px;
            padding: 8px 15px;
            font-size: 1rem;
            border-radius: 8px;
            border: 2px solid var(--accent-color);
            background: white;
            cursor: pointer;
        }

        .card {
            background: white;
            padding: 40px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-top: 20px;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .main-text {
            font-size: 3.5rem;
            font-weight: bold;
            margin-bottom: 10px;
            word-break: break-word;
        }
        .sub-text {
            font-size: 1.5rem;
            color: #666;
            margin-bottom: 20px;
        }
        .nav-buttons {
            margin-top: 30px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        button {
            padding: 12px 25px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-speak { background-color: #457b9d; color: white; width: 100%; max-width: 200px; }
        .btn-prev, .btn-next { background-color: #a8dadc; color: #1d3557; }
        .category-tabs {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;
        }
        .tab {
            padding: 8px 15px;
            background: #ddd;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .tab.active { background: var(--accent-color); color: white; }
        #itemCounter { font-size: 0.8rem; color: #aaa; margin-bottom: 10px; }

	/* 푸터 링크 스타일 */
        .footer {
            margin-top: 30px;
            padding-top: 15px;
            border-top: 1px solid #ddd;
            font-size: 0.85rem;
        }
        .footer a {
            color: #457b9d;
            text-decoration: none;
            font-weight: bold;
        }
        .footer a:hover {
            text-decoration: underline;
            color: var(--accent-color);
        }

    </style>
</head>
<body>

<div class="container">
    <h1>🇪🇸 스페인어 시작</h1>

    <select id="chapterSelector" class="chapter-select" onchange="changeChapter(this.value)">
        <option value="0">Chapter 1: 기초 다지기</option>
        <option value="1">Chapter 2: 일상 확장</option>
	<option value="2">Chapter 3: 실전 기초</option>
	<option value="3">Chapter 4: 길 찾기와 소망</option>
	<option value="4">Chapter 5: 숫자와 가족</option>
	<option value="5">Chapter 6: 요일과 날씨</option>
	<option value="6">Chapter 7: 아픔과 신체</option>
	<option value="7">Chapter 8: 쇼핑과 색상</option>
	<option value="8">Chapter 9: 취미와 여가</option>
	<option value="9">Chapter 10: 미래와 축하</option>
    </select>

    <div class="category-tabs" id="tabs">
        <div class="tab active" onclick="changeCategory(0)">발음/알파벳</div>
        <div class="tab" onclick="changeCategory(1)">기초 문법</div>
        <div class="tab" onclick="changeCategory(2)">필수 회화</div>
    </div>

    <div class="card">
        <div id="itemCounter">1 / 5</div>
	<div class="main-text" id="mainText" onclick="openStudyPopup()" title="클릭하여 예문 보기">Hola</div>
        <div class="sub-text" id="subText">안녕 (올라)</div>
        <button class="btn-speak" onclick="speak()">🔊 발음 듣기</button>
    </div>

    <div class="nav-buttons">
        <button class="btn-prev" onclick="prevItem()">이전</button>
        <button class="btn-next" onclick="nextItem()">다음</button>
    </div>

    <div class="footer">
        <p>전체 내용을 한눈에 복습하기</p>
        <p>
            <a href="total1.html">Part 1 (Ch 1-5)</a> |
            <a href="total2.html">Part 2 (Ch 6-10)</a>
        </p>
    </div>

</div>

<script>
    // 챕터별로 데이터를 묶은 새로운 구조입니다.
    const allChapters = [
        // CHAPTER 1
        [
            [ // 발음
                {es: "A", ko: "아 (사과: Manzana)"}, {es: "H", ko: "아체 (묵음)"}, {es: "LL", ko: "에요 (이/지 발음)"}, {es: "Ñ", ko: "에녜 (니으/뉴 발음)"}, {es: "R", ko: "에레 (굴리는 'ㄹ')"}
            ],
            [ // 문법
                {es: "Yo soy", ko: "나는 ~이다 (성격/이름)"}, {es: "Tú eres", ko: "너는 ~이다"}, {es: "El libro", ko: "그 책 (남성)"}, {es: "La mesa", ko: "그 탁자 (여성)"}, {es: "Un, Una", ko: "하나의 (부정관사)"}
            ],
            [ // 회화
                {es: "¡Hola!", ko: "안녕!"}, {es: "Gracias", ko: "감사합니다"}, {es: "¿Cómo estás?", ko: "어떻게 지내?"}, {es: "Mucho gusto", ko: "반가워요"}, {es: "Adiós", ko: "잘 가요"}
            ]
        ],
        // CHAPTER 2
        [
            [ // 발음
                {es: "C (+e, i)", ko: "쎄, 씨 (S발음)"}, {es: "G (+e, i)", ko: "헤, 히 (ㅎ 발음)"}, {es: "Z", ko: "쎄 (영어 th/S발음)"}, {es: "J", ko: "호따 ('ㅎ' 소리)"}, {es: "V", ko: "우베 (B와 같은 발음)"}
            ],
            [ // 문법
                {es: "Uno, Dos, Tres", ko: "1, 2, 3"}, {es: "Yo tengo", ko: "나는 가지고 있다"}, {es: "Mi, Tu, Su", ko: "나의, 너의, 그의"}, {es: "Chico, Chica", ko: "소년, 소녀 (성별 어미)"}, {es: "Buenos", ko: "좋은 (복수형 -s)"}
            ],
            [ // 회화
                {es: "Buenos días", ko: "좋은 아침"}, {es: "Buenas tardes", ko: "좋은 오후"}, {es: "Buenas noches", ko: "좋은 밤"}, {es: "Perdón", ko: "죄송합니다"}, {es: "De nada", ko: "천만에요"}
            ]
        ],
	    // CHAPTER 3
        [
            [ // 발음 (복합 모음 및 강세)
                {es: "Qué", ko: "께 ('u'는 묵음)"}, {es: "Qui", ko: "끼 ('u'는 묵음)"}, {es: "Gue", ko: "게 ('u'는 묵음)"}, {es: "Gui", ko: "기 ('u'는 묵음)"}, {es: "Acción", ko: "악씨온 (띨데'´'가 있는 곳에 강세)"}
            ],
            [ // 문법 (기본 동사와 의문사)
                {es: "Yo como", ko: "나는 먹는다"}, {es: "Yo bebo", ko: "나는 마신다"}, {es: "¿Qué?", ko: "무엇?"}, {es: "¿Quién?", ko: "누구?"}, {es: "¿Dónde?", ko: "어디?"}
            ],
            [ // 회화 (식당/요청)
                {es: "La cuenta, por favor", ko: "계산서 부탁합니다"}, {es: "¡Salud!", ko: "건배! / 축복을!"}, {es: "¡Qué rico!", ko: "정말 맛있어요!"}, {es: "Agua, por favor", ko: "물 좀 주세요"}, {es: "¿Cuánto cuesta?", ko: "얼마인가요?"}
            ]
        ],
            // CHAPTER 4
        [
            [ // 발음 (심화 및 차이)
                {es: "B / V", ko: "스페인어에서 두 발음은 같음 (입술끼리 닿는 'ㅂ')"}, {es: "Y / LL", ko: "이/지 (예: Yo 요/조)"}, {es: "X", ko: "엑시스 (낱말 중간에서 'ks' 소리)"}, {es: "S", ko: "에쎄 (항상 'ㅅ' 소리)"}, {es: "U", ko: "우 (입술을 쭉 내밀고)"}
            ],
            [ // 문법 (소망과 위치)
                {es: "Yo quiero", ko: "나는 원한다 (하고 싶다)"}, {es: "Aquí / Allí", ko: "여기 / 저기"}, {es: "Cerca / Lejos", ko: "가까운 / 먼"}, {es: "Izquierda", ko: "왼쪽"}, {es: "Derecha", ko: "오른쪽"}
            ],
            [ // 회화 (길 찾기)
                {es: "¿Dónde está...?", ko: "...은 어디에 있나요?"}, {es: "El baño", ko: "화장실"}, {es: "La estación", ko: "역 (Station)"}, {es: "¡Ayúdame!", ko: "도와주세요!"}, {es: "Siga recto", ko: "직진하세요"}
            ]
        ],
	    // CHAPTER 5 (새로 추가된 내용)
        [
            [ // 발음 (숫자 읽기 중심)
                {es: "Once, Doce", ko: "온쎄(11), 도쎄(12)"}, {es: "Trece, Catorce", ko: "뜨레쎄(13), 까또르쎄(14)"}, {es: "Quince", ko: "낀쎄(15)"}, {es: "Dieciséis", ko: "디에씨쎄이스(16)"}, {es: "Veinte", ko: "베인떼(20)"}
            ],
            [ // 문법 (가족과 필요)
                {es: "Yo necesito", ko: "나는 필요하다"}, {es: "Padre / Madre", ko: "아버지 / 어머니"}, {es: "Hermano", ko: "남자 형제"}, {es: "Hermana", ko: "여자 형제"}, {es: "Amigo", ko: "친구"}
            ],
            [ // 회화 (가족 소개 및 요청)
                {es: "Mi familia", ko: "나의 가족"}, {es: "Necesito ayuda", ko: "도움이 필요해요"}, {es: "Tengo un hermano", ko: "남자 형제가 한 명 있어요"}, {es: "Él es mi amigo", ko: "그는 제 친구예요"}, {es: "¿Tienes hermanos?", ko: "형제가 있나요?"}
            ]
        ],
	    // CHAPTER 6 (요일과 날씨)
        [
            [ // 발음/시간 (요일)
                {es: "Lunes, Martes", ko: "월요일, 화요일"}, {es: "Miércoles", ko: "수요일"}, {es: "Jueves, Viernes", ko: "목요일, 금요일"}, {es: "Sábado, Domingo", ko: "토요일, 일요일"}, {es: "Hoy, Mañana", ko: "오늘, 내일"}
            ],
            [ // 기초 문법 (현재 상태 Estoy)
                {es: "Yo estoy", ko: "나는 (지금) ~한 상태다"}, {es: "Cansado/a", ko: "피곤한"}, {es: "Feliz", ko: "행복한"}, {es: "En casa", ko: "집에 있는"}, {es: "Muy bien", ko: "매우 좋은"}
            ],
            [ // 필수 회화 (날씨)
                {es: "¿Qué tiempo hace?", ko: "날씨가 어때요?"}, {es: "Hace calor", ko: "더워요"}, {es: "Hace frío", ko: "추워요"}, {es: "Está lloviendo", ko: "비가 오고 있어요"}, {es: "Buen viaje", ko: "좋은 여행 되세요"}
            ]
        ],
	    // CHAPTER 7 (아픔과 신체)
        [
            [ // 발음 (신체 명칭으로 연습)
                {es: "Cabeza", ko: "까베싸 (머리)"}, {es: "Brazo", ko: "브라쏘 (팔)"}, {es: "Mano", ko: "마노 (손)"}, {es: "Pierna", ko: "삐에르나 (다리)"}, {es: "Corazón", ko: "꼬라쏜 (심장/마음)"}
            ],
            [ // 기초 문법 (아픔 표현 Me duele)
                {es: "Me duele...", ko: "나는 ...이 아프다"}, {es: "Mucho", ko: "많이 / 매우"}, {es: "Un poco", ko: "조금"}, {es: "Enfermo/a", ko: "아픈 (상태)"}, {es: "Médico", ko: "의사"}
            ],
            [ // 필수 회화 (병원/약국)
                {es: "Me duele la cabeza", ko: "머리가 아파요"}, {es: "Tengo fiebre", ko: "열이 나요"}, {es: "Necesito medicina", ko: "약이 필요해요"}, {es: "Estoy 말(mal)", ko: "몸 상태가 안 좋아요"}, {es: "¡Cuídate!", ko: "몸조리 잘해! (조심해)"}
            ]
        ],
	    // CHAPTER 8 (쇼핑과 색상)
        [
            [ // 발음 (색상 명칭으로 연습)
                {es: "Rojo", ko: "로호 (빨간색)"}, {es: "Azul", ko: "아쑬 (파란색)"}, {es: "Verde", ko: "베르데 (초록색)"}, {es: "Amarillo", ko: "아마리요 (노란색)"}, {es: "Blanco / Negro", ko: "블랑꼬 / 네그로 (흰색/검정)"}
            ],
            [ // 기초 문법 (지시 대명사와 형용사)
                {es: "Este / Esta", ko: "이것 (남성/여성)"}, {es: "Ese / Esa", ko: "그것 (남성/여성)"}, {es: "Barato", ko: "값싼"}, {es: "Caro", ko: "비싼"}, {es: "Grande / Pequeño", ko: "큰 / 작은"}
            ],
            [ // 필수 회화 (쇼핑하기)
                {es: "Solo estoy mirando", ko: "그냥 구경하는 중이에요"}, {es: "¿제(p)uedo probármelo?", ko: "입어봐도 될까요?"}, {es: "Es muy caro", ko: "너무 비싸요"}, {es: "¿Tiene 하나(otro) 색(color)?", ko: "다른 색상도 있나요?"}, {es: "Me lo llevo", ko: "이걸로 살게요 (가져갈게요)"}
            ]
        ],
	   // CHAPTER 9 (취미와 여가)
        [
            [ // 발음 (취미 활동으로 연습)
                {es: "Música", ko: "무시까 (음악)"}, {es: "Película", ko: "뻴리꿀라 (영화)"}, {es: "Deporte", ko: "데뽀르떼 (스포츠)"}, {es: "Viaje", ko: "비아헤 (여행)"}, {es: "Baile", ko: "바일레 (춤)"}
            ],
            [ // 기초 문법 (좋아함 표현 Me gusta)
                {es: "Me gusta...", ko: "나는 ...을 좋아한다"}, {es: "Me encanta...", ko: "나는 ...을 정말 좋아한다"}, {es: "Ver", ko: "보다 (Watch)"}, {es: "Escuchar", ko: "듣기 (Listen)"}, {es: "Jugar", ko: "놀다/경기하다 (Play)"}
            ],
            [ // 필수 회화 (제안과 초대)
                {es: "¿Quieres ir al cine?", ko: "영화관에 갈래?"}, {es: "¡Buena idea!", ko: "좋은 생각이야!"}, {es: "Lo siento, no puedo", ko: "미안해, 갈 수 없어"}, {es: "¿Qué haces el sábado?", ko: "토요일에 뭐 하니?"}, {es: "Tengo un plan", ko: "계획(약속)이 있어요"}
            ]
        ],
	    // CHAPTER 10 (미래와 축하)
        [
            [ // 발음 (축하와 감탄 연습)
                {es: "¡Felicidades!", ko: "뻴리씨다데스 (축하해요!)"}, {es: "Cumpleaños", ko: "꿈쁠레아뇨스 (생일)"}, {es: "Suerte", ko: "수에르떼 (운/행운)"}, {es: "Éxito", ko: "엑씨또 (성공)"}, {es: "Abrazo", ko: "아브라쏘 (포옹/인사)"}
            ],
            [ // 기초 문법 (미래형 Ir a + 동사원형)
                {es: "Voy a...", ko: "나는 ...할 것이다"}, {es: "Vas a...", ko: "너는 ...할 것이다"}, {es: "Trabajar", ko: "일하다"}, {es: "Descansar", ko: "쉬다"}, {es: "Estudiar", ko: "공부하다"}
            ],
            [ // 필수 회화 (덕담과 작별)
                {es: "¡Feliz cumpleaños!", ko: "생일 축하해!"}, {es: "¡Buena suerte!", ko: "행운을 빌어!"}, {es: "Voy a comer", ko: "밥 먹으러 갈 거야"}, {es: "¡Hasta luego!", ko: "나중에 봐!"}, {es: "¡Nos vemos!", ko: "우리 또 만나!"}
            ]
        ]


    ];

    let currentChapter = 0;
    let currentCategory = 0;
    let currentIndex = 0;

    function updateDisplay() {
        const currentData = allChapters[currentChapter][currentCategory];
        const item = currentData[currentIndex];

        document.getElementById('mainText').innerText = item.es;
        document.getElementById('subText').innerText = item.ko;
        document.getElementById('itemCounter').innerText = `${currentIndex + 1} / ${currentData.length}`;

        // 탭 업데이트
        const tabs = document.querySelectorAll('.tab');
        tabs.forEach((tab, index) => {
            tab.classList.toggle('active', index === currentCategory);
        });
    }

    function changeChapter(val) {
        currentChapter = parseInt(val);
        currentCategory = 0;
        currentIndex = 0;
        updateDisplay();
    }

    function changeCategory(catIndex) {
        currentCategory = catIndex;
        currentIndex = 0;
        updateDisplay();
    }

    function nextItem() {
        if (currentIndex < allChapters[currentChapter][currentCategory].length - 1) {
            currentIndex++;
            updateDisplay();
        }
    }

    function prevItem() {
        if (currentIndex > 0) {
            currentIndex--;
            updateDisplay();
        }
    }

    function speak() {
        const text = document.getElementById('mainText').innerText;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'es-ES';
        window.speechSynthesis.speak(utterance);
    }

    updateDisplay();

function openStudyPopup() {
    let popupFile = "";

    if (currentChapter === 0) {
        // 발음 카테고리 (index 0)
        if (currentCategory === 0) {
            if (currentIndex === 0) popupFile = "pop/1_1.html";
            else if (currentIndex === 1) popupFile = "pop/1_2.html";
            else if (currentIndex === 2) popupFile = "pop/1_3.html";
            else if (currentIndex === 3) popupFile = "pop/1_4.html";
            else if (currentIndex === 4) popupFile = "pop/1_5.html";
        }


	    // 기초 문법 카테고리 (index 1) 부분 수정
else if (currentCategory === 1) {
    if (currentIndex === 0) popupFile = "pop/2_1.html"; // Yo soy
    else if (currentIndex === 1) popupFile = "pop/2_2.html"; // Tú eres
    else if (currentIndex === 2 || currentIndex === 3) {
        popupFile = "pop/2_3.html"; // El libro 와 La mesa 둘 다 이 파일로 연결!
    }
    else if (currentIndex === 4) popupFile = "pop/2_4.html"; // Un, Una
}
    }

    if (popupFile !== "") {
        const width = window.innerWidth / 2;
        const height = window.innerHeight / 2;
        const left = (window.screen.width - width) / 2;
        const top = (window.screen.height - height) / 2;

        window.open(popupFile, 'studyPopup',
            `width=${width},height=${height},left=${left},top=${top},scrollbars=yes`);
    }
}


</script>

</body>
</html>
