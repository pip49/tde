
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스페인어 시작 - 기초 학습</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --text-color: #333;
            --accent-color: #e63946;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1 { color: var(--accent-color); font-size: 1.5rem; }
        .card {
            background: white;
            padding: 40px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-top: 30px;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .main-text {
            font-size: 3.5rem;
            font-weight: bold;
            margin-bottom: 10px;
            word-break: break-word;
        }
        .sub-text {
            font-size: 1.5rem;
            color: #666;
            margin-bottom: 20px;
        }
        .nav-buttons {
            margin-top: 30px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        button {
            padding: 12px 25px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-speak { background-color: #457b9d; color: white; width: 100%; max-width: 200px; }
        .btn-prev, .btn-next { background-color: #a8dadc; color: #1d3557; }
        .category-tabs {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;
        }
        .tab {
            padding: 8px 15px;
            background: #ddd;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .tab.active { background: var(--accent-color); color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>🇪🇸 스페인어 시작</h1>

    <div class="category-tabs" id="tabs">
        <div class="tab active" onclick="changeCategory(0)">발음/알파벳</div>
        <div class="tab" onclick="changeCategory(1)">기초 문법</div>
        <div class="tab" onclick="changeCategory(2)">필수 회화</div>
    </div>

    <div class="card">
        <div class="main-text" id="mainText">Hola</div>
        <div class="sub-text" id="subText">안녕 (올라)</div>
        <button class="btn-speak" onclick="speak()">🔊 발음 듣기</button>
    </div>

    <div class="nav-buttons">
        <button class="btn-prev" onclick="prevItem()">이전</button>
        <button class="btn-next" onclick="nextItem()">다음</button>
    </div>
</div>

<script>
    const studyData = [
        // 카테고리 0: 발음/알파벳
        [
            {es: "A", ko: "아 (사과: Manzana)"},
            {es: "H", ko: "아체 (묵음, 발음 안 함)"},
            {es: "LL", ko: "에요 (이/지 발음, 예: Ella 에야)"},
            {es: "Ñ", ko: "에녜 (니으/뉴 발음, 예: Niño 니뇨)"},
            {es: "R", ko: "에레 (굴리는 'ㄹ' 발음)"}
        ],
        // 카테고리 1: 기초 문법
        [
            {es: "Yo soy", ko: "나는 ~이다 (성격/이름)"},
            {es: "Tú eres", ko: "너는 ~이다"},
            {es: "El libro", ko: "그 책 (남성 명사)"},
            {es: "La mesa", ko: "그 탁자 (여성 명사)"},
            {es: "Un, Una", ko: "하나의 (부정관사)"}
        ],
        // 카테고리 2: 필수 회화
        [
            {es: "¡Hola!", ko: "안녕!"},
            {es: "Gracias", ko: "감사합니다"},
            {es: "¿Cómo estás?", ko: "어떻게 지내?"},
            {es: "Mucho gusto", ko: "반가워요"},
            {es: "Adiós", ko: "잘 가요"}
        ]
    ];

    let currentCategory = 0;
    let currentIndex = 0;

    function updateDisplay() {
        const item = studyData[currentCategory][currentIndex];
        document.getElementById('mainText').innerText = item.es;
        document.getElementById('subText').innerText = item.ko;

        // 탭 활성화 상태 업데이트
        const tabs = document.querySelectorAll('.tab');
        tabs.forEach((tab, index) => {
            tab.classList.toggle('active', index === currentCategory);
        });
    }

    function changeCategory(catIndex) {
        currentCategory = catIndex;
        currentIndex = 0;
        updateDisplay();
    }

    function nextItem() {
        if (currentIndex < studyData[currentCategory].length - 1) {
            currentIndex++;
            updateDisplay();
        }
    }

    function prevItem() {
        if (currentIndex > 0) {
            currentIndex--;
            updateDisplay();
        }
    }

    function speak() {
        const text = document.getElementById('mainText').innerText;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'es-ES'; // 스페인어(스페인) 설정
        window.speechSynthesis.speak(utterance);
    }

    // 초기 표시
    updateDisplay();
</script>

</body>
</html>
