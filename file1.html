
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스페인어 기초 단어장</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .card {
            width: 85%;
            max-width: 400px;
            height: 250px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
            text-align: center;
            padding: 20px;
        }
        .card:active { transform: scale(0.98); }
        .word { font-size: 2.5rem; font-weight: bold; color: #1a73e8; }
        .meaning { font-size: 1.5rem; color: #5f6368; margin-top: 20px; display: none; }
        .meaning.show { display: block; }
        .controls { margin-top: 40px; display: flex; gap: 20px; }
        button {
            padding: 12px 25px;
            font-size: 1rem;
            border: none;
            border-radius: 10px;
            background: #1a73e8;
            color: white;
            cursor: pointer;
        }
        .counter { margin-top: 20px; color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="card" onclick="toggleMeaning()">
        <div id="word" class="word">Hola</div>
        <div id="meaning" class="meaning">안녕</div>
    </div>

    <div class="counter"><span id="currentIdx">1</span> / <span id="totalIdx">0</span></div>

    <div class="controls">
        <button onclick="prevWord()">이전</button>
        <button onclick="nextWord()">다음</button>
        <button onclick="shuffleWords()" style="background:#34a853;">섞기</button>
    </div>

    <script>
        const vocabulary = [
            { w: "Hola", m: "안녕" },
            { w: "Gracias", m: "감사합니다" },
            { w: "Por favor", m: "부탁합니다(Please)" },
            { w: "Buenos días", m: "좋은 아침" },
            { w: "Lo siento", m: "미안합니다" },
            { w: "Sí / No", m: "예 / 아니요" },
            { w: "Agua", m: "물" },
            { w: "Comer", m: "먹다" },
            { w: "Amigo", m: "친구" },
            { w: "Baño", m: "화장실" }
        ];

        let currentIndex = 0;
        const wordEl = document.getElementById('word');
        const meaningEl = document.getElementById('meaning');
        const currentIdxEl = document.getElementById('currentIdx');
        const totalIdxEl = document.getElementById('totalIdx');

        totalIdxEl.innerText = vocabulary.length;

        function updateCard() {
            wordEl.innerText = vocabulary[currentIndex].w;
            meaningEl.innerText = vocabulary[currentIndex].m;
            meaningEl.classList.remove('show');
            currentIdxEl.innerText = currentIndex + 1;
        }

        function toggleMeaning() {
            meaningEl.classList.toggle('show');
        }

        function nextWord() {
            currentIndex = (currentIndex + 1) % vocabulary.length;
            updateCard();
        }

        function prevWord() {
            currentIndex = (currentIndex - 1 + vocabulary.length) % vocabulary.length;
            updateCard();
        }

        function shuffleWords() {
            vocabulary.sort(() => Math.random() - 0.5);
            currentIndex = 0;
            updateCard();
        }

        updateCard();
    </script>
</body>
</html>
